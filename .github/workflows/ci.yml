name: CI/CD Pipeline

# Cuándo se dispara este workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # permite ejecutarlo manualmente desde la UI

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Lint + Tests + Coverage (la build del servidor de CI)
  # ═══════════════════════════════════════════════════════════════
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ejecutar linter (ruff)
        run: ruff check app tests

      - name: Ejecutar tests con coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Subir reporte de coverage como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Validación del Spec OpenAPI (Spec Driven Development)
  # ═══════════════════════════════════════════════════════════════
  validate-spec:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar validador
        run: pip install openapi-spec-validator

      - name: Validar specs/openapi.yaml
        run: openapi-spec-validator specs/openapi.yaml

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Análisis de calidad con SonarCloud
  # ═══════════════════════════════════════════════════════════════
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: lint-and-test  # depende de que los tests pasen

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          # Sonar necesita el historial completo para análisis comparativo
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generar reporte de coverage
        run: pytest --cov=app --cov-report=xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ═══════════════════════════════════════════════════════════════
  # JOB 4: Deploy a Render (solo si lint+tests y spec pasan)
  # ═══════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [lint-and-test, validate-spec]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 5: Build de la imagen Docker
  # ═══════════════════════════════════════════════════════════════
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test  # solo si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de la imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false  # por ahora solo build, sin push a registry
          tags: tasks-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max